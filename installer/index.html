<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ziddy Installer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">⚙️</div>
      </div>
      <div class="title-section">
        <h1>Ziddy Installer</h1>
        <p>Dependency Detection & Installation</p>
      </div>
    </div>

    <div class="scan-section">
      <button class="scan-btn" id="scan-btn" onclick="scanSystem()">
        <span class="btn-icon">🔍</span>
        Scan System
      </button>
    </div>

    <div class="status-grid">
      <div class="status-card" id="node-card">
        <div class="status-header">
          <div class="status-icon" id="node-icon">?</div>
          <span class="status-title">Node.js</span>
        </div>
        <div class="status-content">
          <span class="status-value" id="node-value">Not checked</span>
        </div>
        <div class="status-action">
          <button class="action-btn" id="node-action" onclick="handleNodeAction()" disabled>
            Install Node.js
          </button>
        </div>
      </div>

      <div class="status-card" id="npm-card">
        <div class="status-header">
          <div class="status-icon" id="npm-icon">?</div>
          <span class="status-title">npm</span>
        </div>
        <div class="status-content">
          <span class="status-value" id="npm-value">Not checked</span>
        </div>
        <div class="status-action">
          <button class="action-btn" id="npm-action" onclick="handleNpmAction()" disabled>
            Install npm
          </button>
        </div>
      </div>

      <div class="status-card" id="deps-card">
        <div class="status-header">
          <div class="status-icon" id="deps-icon">?</div>
          <span class="status-title">Dependencies</span>
        </div>
        <div class="status-content">
          <span class="status-value" id="deps-value">Not checked</span>
        </div>
        <div class="status-action">
          <button class="action-btn" id="deps-action" onclick="handleDepsAction()" disabled>
            Install Dependencies
          </button>
        </div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <span class="progress-text" id="progress-text">Ready</span>
    </div>

    <div class="log-section">
      <div class="log-header">
        <span>Installation Log</span>
        <button class="clear-btn" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-content" id="log-content"></div>
    </div>

    <div class="install-all-section">
      <button class="install-all-btn" id="install-all-btn" onclick="installAll()" disabled>
        <span class="btn-icon">📦</span>
        Install All Missing
      </button>
    </div>

    <div class="footer">
      <p>Click to detect and install required dependencies</p>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
